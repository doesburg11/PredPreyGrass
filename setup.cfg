[flake8]

max-line-length = 132
select = F,E9
# Suppress warnings triggered by statements before imports, Black-style slices,
# and formatter-dependent binary operator line breaks.
ignore = E203,E402,W503,W504
exclude =
    .git,
    .conda,
    __pycache__,
    build,
    dist,
    *.egg-info,
    */ray_results/*,
    */ray_results_archive/*,
    */ray_results_failed/*,
    */genomes/*,
