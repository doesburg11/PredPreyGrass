---
name: Python tests

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    linux-test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Set up Python 3.11
              uses: actions/setup-python@v4
              with:
                  python-version: '3.11'
            - name: Install dependencies
              run: pip install -e .[dev]
            - name: Run tests
              run: pytest predpreygrass/eco_evolutionary_investment/tests/ -v
